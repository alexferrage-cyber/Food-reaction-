<!--
  Food Reaction Tracker — application 100% locale (localStorage), hébergeable sur GitHub Pages.
  Aucune dépendance externe obligatoire. Ne pose AUCUN diagnostic médical : produit uniquement
  des scores de suspicion / corrélation observée et des explications éducatives.
  Fichier unique : copiez-le tel quel dans index.html.
-->
<style>
/* ============================ DESIGN TOKENS ============================ */
:root{
  color-scheme:light;     /* contrôles natifs (date/heure) en thème clair par défaut */
  --paper:#f6f4ee;        /* fond "carnet de labo", chaud mais neutre */
  --card:#fffdf8;
  --ink:#23282b;          /* texte principal */
  --ink-soft:#5b6469;
  --line:#e2ddd2;
  --line-strong:#cfc8b9;
  --sage:#3f7d6e;         /* primaire calme, santé sans cliché bleu médical */
  --sage-soft:#e4efe9;
  --amber:#b8782a;        /* prudence / suspicion moyenne */
  --amber-soft:#f6e9d4;
  --coral:#bb4a3f;        /* intensité forte / suspicion élevée */
  --coral-soft:#f6e0db;
  --focus:#2f6f8f;
  --radius:14px;
  --shadow:0 1px 2px rgba(40,40,30,.05),0 6px 20px rgba(40,40,30,.06);
  --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-display:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
}
:root[data-theme="dark"]{
  color-scheme:dark;      /* force le texte des champs date/heure en clair sur fond sombre */
  --paper:#161a1c; --card:#1e2326; --ink:#e8e6df; --ink-soft:#9aa3a6;
  --line:#2c3236; --line-strong:#3a4145; --sage:#5fae9b; --sage-soft:#1f3631;
  --amber:#d79a52; --amber-soft:#3a2f1d; --coral:#e08074; --coral-soft:#3a2420;
  --card:#1e2326; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-ui);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion:no-preference){
  *{transition:background-color .2s,border-color .2s,color .2s}
}
h1,h2,h3{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em;line-height:1.15;margin:0}
a{color:var(--sage)}
button{font-family:inherit;font-size:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit}

/* ============================ LAYOUT ============================ */
.app{max-width:1040px;margin:0 auto;padding:0 16px 120px}
header.top{
  display:flex;align-items:center;gap:12px;padding:18px 4px 14px;flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:2px}
.logo{flex:none;display:block}
.brand h1{font-size:24px}
.brand .sub{font-size:12.5px;color:var(--ink-soft)}
.top .spacer{flex:1}
.icon-btn{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:8px 12px;color:var(--ink);display:inline-flex;align-items:center;gap:7px;
}
.icon-btn:hover{border-color:var(--line-strong)}

/* Disclaimer bandeau */
.disclaimer{
  background:var(--amber-soft);border:1px solid var(--line-strong);
  border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--ink-soft);
  margin:0 4px 14px;
}
.disclaimer strong{color:var(--ink)}

/* Tabs */
nav.tabs{
  display:flex;gap:4px;overflow-x:auto;padding:4px;margin:0 -4px 18px;
  border-bottom:1px solid var(--line);scrollbar-width:thin;
}
nav.tabs button{
  background:none;border:none;padding:10px 14px;color:var(--ink-soft);
  border-radius:8px 8px 0 0;white-space:nowrap;font-weight:500;position:relative;
}
nav.tabs button[aria-selected="true"]{color:var(--ink);font-weight:600}
nav.tabs button[aria-selected="true"]::after{
  content:"";position:absolute;left:10px;right:10px;bottom:-5px;height:2.5px;
  background:var(--sage);border-radius:2px;
}
nav.tabs button:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

/* Cards & grid */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px}
.grid{display:grid;gap:14px}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid.cols-4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px}
.section-head h2{font-size:19px}
.muted{color:var(--ink-soft)}
.small{font-size:12.5px}

/* Buttons */
.btn{background:var(--sage);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:600}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:none;color:var(--ink);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:var(--paper)}
.btn.danger{background:var(--coral)}
.btn:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* Forms */
label.field{display:block;margin-bottom:12px}
label.field > span{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;font-weight:500}
input[type=text],input[type=date],input[type=time],input[type=number],input[type=password],select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;
  background:var(--paper);color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--focus);outline-offset:0;border-color:var(--focus)}
textarea{resize:vertical;min-height:54px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:120px}

/* Chips / families */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  border:1px solid var(--line-strong);background:var(--paper);border-radius:20px;
  padding:4px 10px;font-size:12px;color:var(--ink-soft);cursor:pointer;user-select:none;
}
.chip[aria-pressed="true"]{background:var(--sage-soft);border-color:var(--sage);color:var(--sage);font-weight:600}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.fam{background:var(--sage-soft);color:var(--sage);border:1px solid transparent}

/* Suspicion badge */
.lvl{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.lvl.faible{background:var(--sage-soft);color:var(--sage)}
.lvl.moyen{background:var(--amber-soft);color:var(--amber)}
.lvl.eleve{background:var(--coral-soft);color:var(--coral)}

/* Lists */
.entry{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--card);margin-bottom:10px}
.entry .head{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.entry .when{font-size:12.5px;color:var(--ink-soft)}
.entry .del{background:none;border:none;color:var(--coral);font-size:12.5px;padding:4px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--paper)}

/* Stat tiles */
.stat{padding:16px}
.stat .n{font-family:var(--font-display);font-size:30px;line-height:1}
.stat .l{font-size:12px;color:var(--ink-soft);margin-top:6px}

/* ====== SIGNATURE : la jauge de suspicion, volontairement "incertaine" ====== */
.gauge{display:flex;align-items:center;gap:14px}
.gauge svg{flex:none}
.gauge .meta{font-size:12.5px;color:var(--ink-soft)}
.gauge .score-n{font-family:var(--font-display);font-size:26px;line-height:1;color:var(--ink)}

/* CSS bar chart (sans librairie) */
.bars{display:flex;flex-direction:column;gap:8px}
.bar-row{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:10px;font-size:12.5px}
.bar-track{background:var(--paper);border:1px solid var(--line);border-radius:6px;height:18px;overflow:hidden}
.bar-fill{height:100%;background:var(--sage);border-radius:6px 0 0 6px}
.bar-fill.amber{background:var(--amber)} .bar-fill.coral{background:var(--coral)}
.bar-row .v{text-align:right;color:var(--ink-soft)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,20,15,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.modal{background:var(--card);width:100%;max-width:560px;max-height:88vh;overflow:auto;
  border-radius:18px 18px 0 0;padding:22px}
@media(min-width:600px){.modal-bg{align-items:center}.modal{border-radius:18px}}
.modal h3{font-size:20px;margin-bottom:4px}
.modal .close{float:right;background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;line-height:1}

/* Item editor inside meal form */
.item-card{border:1px dashed var(--line-strong);border-radius:11px;padding:12px;margin-bottom:10px;background:var(--paper)}
.item-card .item-top{display:flex;gap:8px;align-items:flex-end}
.item-card .item-top > *{margin:0}

/* Toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:10px;
  font-size:13.5px;z-index:80;opacity:0;pointer-events:none}
.toast.show{opacity:1;transition:opacity .2s}

/* Empty state */
.empty{text-align:center;padding:36px 16px;color:var(--ink-soft)}
.empty .big{font-family:var(--font-display);font-size:18px;color:var(--ink);margin-bottom:6px}

.hr{height:1px;background:var(--line);border:none;margin:18px 0}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px}
.warn{background:var(--coral-soft);border:1px solid var(--coral);border-radius:10px;padding:10px 13px;font-size:12.5px;color:var(--ink)}
.ok-note{background:var(--sage-soft);border:1px solid var(--sage);border-radius:10px;padding:10px 13px;font-size:12.5px}
details summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--sage)}
details{margin-top:8px}
.kvs{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:13px;margin:8px 0}
.kvs .k{color:var(--ink-soft)}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <svg class="logo" width="38" height="38" viewBox="0 0 36 36" role="img" aria-label="Logo Food Reaction Tracker">
      <rect width="36" height="36" rx="9" fill="#3f7d6e"/>

      <path d="M12 17 C13.8 15.4 15.7 13.8 17.6 12.4" stroke="#3f7d6e" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <circle cx="15.8" cy="15.8" r="7.6" fill="none" stroke="#fff" stroke-width="2.3"/>
      <line x1="21.4" y1="21.4" x2="28" y2="28" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <main id="view"></main>
</div>

<script>
/* =====================================================================
   FOOD REACTION TRACKER — app.js (inline)
   Tout est commenté en français. Vanilla JS, localStorage, aucune dépendance.
   ===================================================================== */
"use strict";

/* ----------------------------- Constantes ----------------------------- */
const STORE_KEY = "frt_data_v1";

const FAMILIES = [
  "produits laitiers","gluten/blé","œufs","fruits à coque","légumineuses",
  "FODMAP","aliments fermentés","alcool","caféine","épices","friture","fruits",
  "légumes","viande","poisson/fruits de mer","ultra-transformé","autre"
];

const SYMPTOM_TYPES = [
  "nausée","diarrhée","douleurs abdominales","ballonnements","fatigue",
  "maux de tête","reflux","démangeaisons","rougeurs","autre"
];

const MEAL_TYPES = ["petit-déjeuner","déjeuner","dîner","snack","autre"];

/* Portions à 3 niveaux (pas de pesée). Poids utilisé pour la nutrition (sources/jour)
   et, plus doucement, pour le facteur de dose du score de suspicion. */
const PORTIONS = ["petite","normale","grande"];
function portionWeight(p){ return ({petite:0.5, normale:1, grande:1.5})[p] ?? 1; }
function itemPortion(it){ return it && it.portion ? it.portion : "normale"; }
function clamp(x,lo,hi){ return Math.max(lo, Math.min(hi, x)); }

/* Fenêtres temporelles : un repas est "associé" à un symptôme survenu
   APRÈS le repas, dans les 48 h. Plus c'est proche, plus le poids est fort. */
const WINDOWS = [
  { maxH:2,  w:1.00, label:"0–2 h" },
  { maxH:6,  w:0.85, label:"2–6 h" },
  { maxH:12, w:0.65, label:"6–12 h" },
  { maxH:24, w:0.45, label:"12–24 h" },
  { maxH:48, w:0.25, label:"24–48 h" }
];
const MAX_WINDOW_H = 48;
const ALPHA = 2; // pseudo-comptes pour le lissage bayésien (anti petits échantillons)

/* Hypothèses éducatives par famille (composants potentiellement en cause). */
const FAMILY_HYPOTHESES = {
  "produits laitiers": { comp:["lactose","caséine","protéines de lait"], why:"Le lactose (sucre du lait) et les protéines (caséine, lactosérum) sont des causes fréquentes de troubles digestifs ou de réactions." },
  "gluten/blé":        { comp:["gluten","fructanes (FODMAP)"], why:"Le gluten et les fructanes du blé peuvent provoquer ballonnements et inconfort chez certaines personnes sensibles." },
  "œufs":              { comp:["protéines d'œuf (ovalbumine)"], why:"Les protéines de l'œuf sont un allergène alimentaire courant." },
  "fruits à coque":    { comp:["allergènes (protéines)"], why:"Les fruits à coque comptent parmi les allergènes alimentaires majeurs." },
  "légumineuses":      { comp:["GOS (FODMAP)","lectines"], why:"Les galacto-oligosaccharides fermentent dans l'intestin et peuvent causer des ballonnements." },
  "FODMAP":            { comp:["fructanes","polyols","fructose"], why:"Les FODMAP sont des glucides fermentescibles fréquemment liés au syndrome de l'intestin irritable." },
  "aliments fermentés":{ comp:["histamine","tyramine"], why:"La fermentation augmente l'histamine ; une sensibilité à l'histamine peut déclencher rougeurs, maux de tête." },
  "alcool":            { comp:["éthanol","histamine","sulfites"], why:"L'alcool, l'histamine et les sulfites peuvent provoquer flush, maux de tête, troubles digestifs." },
  "caféine":           { comp:["caféine"], why:"La caféine stimule le transit et peut accentuer reflux ou inconfort chez les personnes sensibles." },
  "épices":            { comp:["capsaïcine"], why:"La capsaïcine (piment) peut irriter le tube digestif et déclencher reflux ou douleurs." },
  "friture":           { comp:["matières grasses cuites","acides gras oxydés","acrylamide"], why:"Les aliments frits sont très gras : ils ralentissent la vidange gastrique et peuvent provoquer lourdeur, reflux, nausée ou diarrhée chez les personnes sensibles au gras." },

/* Renvoie les familles suggérées pour un nom d'aliment (tableau, éventuellement vide). */
function classifyFood(name){
  const joined = deaccent(name);
  const words = joined.split(/[^a-z0-9]+/).filter(Boolean);
  const fams = new Set();
  for(const [kw, list, not] of FOOD_FAMILIES){
    if(not && not.some(x => joined.includes(x))) continue;
    const multi = /[ -]/.test(kw);
    const match = multi ? joined.includes(kw) : words.some(w => w === kw || w.startsWith(kw));
    if(match) list.forEach(f => fams.add(f));
  }
  return [...fams];
}

/* Trouve un aliment par nom (insensible casse) ou le crée. */
function getOrCreateFood(name, families){
  name = name.trim();
  let f = DB.foods.find(x => x.name.toLowerCase() === name.toLowerCase());
  if(f){
    // fusionne d'éventuelles nouvelles familles
    (families||[]).forEach(fam => { if(!f.families.includes(fam)) f.families.push(fam); });
    return f;
  }
  f = { id:uid(), name, families:(families||[]).slice(), notes:"" };
  DB.foods.push(f);
  return f;
}
function foodById(id){ return DB.foods.find(f=>f.id===id); }

/* Poids temporel pour un délai (heures) entre repas et symptôme. */
function windowWeight(hours){
  if(hours <= 0) return 0;                 // symptôme avant/pendant le repas -> ignoré
  for(const win of WINDOWS){ if(hours <= win.maxH) return win.w; }
  return 0;                                // au-delà de 48 h -> non associé
}
function windowLabel(hours){
  for(const win of WINDOWS){ if(hours <= win.maxH) return win.label; }
  return ">48 h";
}

/* Pour un repas donné, renvoie le meilleur symptôme associé dans les 48 h. */
function bestSymptomAfter(mealIso){
  let best = null;
  for(const s of DB.symptoms){
    const h = hoursBetween(mealIso, s.startDatetime);
    const w = windowWeight(h);
    if(w > 0){
      const strength = w * (s.intensity/10);
      if(!best || strength > best.strength){
        best = { symptom:s, delayH:h, weight:w, strength };
      }
    }
  }
  return best; // null si aucun
}

/* CŒUR : score d'association par aliment, corrigé du taux de base.
   Renvoie un tableau trié décroissant par score. */
function calculateFoodScores(){
  const maxWindow = DB.settings.window || MAX_WINDOW_H;

  // Taux de base : proportion de repas suivis d'un symptôme (<=48 h)
  let mealsHit = 0;
  const mealHitMap = {}; // mealId -> bestSymptom info | null
  for(const m of DB.meals){
    const best = bestSymptomAfter(m.datetime);
    mealHitMap[m.id] = best;
    if(best) mealsHit++;
  }
  const totalMeals = DB.meals.length;
  const baseRate = totalMeals ? mealsHit/totalMeals : 0;

  // Agrégation par aliment
  const agg = {}; // foodId -> {exposures, hits, intens[], weights[], delays[]}
  for(const m of DB.meals){
    const best = mealHitMap[m.id];
    const seen = new Set(); // un aliment compte une fois par repas
    for(const it of (m.items||[])){
      if(seen.has(it.foodId)) continue;
      seen.add(it.foodId);
      if(!agg[it.foodId]) agg[it.foodId] = { exposures:0, hits:0, intens:[], weights:[], delays:[], portions:[] };
      const a = agg[it.foodId];
      a.exposures++;
      if(best){
        a.hits++;
        a.intens.push(best.symptom.intensity);
        a.weights.push(best.weight);
        a.delays.push(best.delayH);
        a.portions.push(portionWeight(itemPortion(it))); // taille de portion avant ce symptôme
      }
    }
  }

  const rows = [];
  for(const foodId in agg){
    const a = agg[foodId];
    const food = foodById(foodId);
    if(!food) continue;
    const n = a.exposures, h = a.hits, nonHits = n - h;

    // Taux postérieur lissé vers le taux de base (anti petits échantillons)
    const posterior = (h + ALPHA*baseRate) / (n + ALPHA);
    const lift = baseRate>0 ? posterior/baseRate : 0;

    // Association : part du chemin entre taux de base et certitude (0..1)
    const denom = (1 - baseRate) || 1e-6;
    const assoc = Math.max(0, Math.min(1, (posterior - baseRate)/denom));

    const avgIntensity = h ? a.intens.reduce((s,x)=>s+x,0)/h : 0;
    const avgWeight    = h ? a.weights.reduce((s,x)=>s+x,0)/h : 0;
    const avgDelay     = h ? a.delays.reduce((s,x)=>s+x,0)/h  : 0;
    const avgPortion   = h ? a.portions.reduce((s,x)=>s+x,0)/h : 1;

    const intensityFactor = h ? (0.4 + 0.6*(avgIntensity/10)) : 0;
    const temporalFactor  = h ? (0.4 + 0.6*avgWeight) : 0;
    // Facteur de dose : grandes portions avant symptômes -> score relevé ; petites -> abaissé.
    // Centré sur 1 pour "normale", volontairement modéré (0,75–1,35) et neutre si données absentes.
    const doseFactor = h ? clamp(avgPortion, 0.75, 1.35) : 1;

    let score = Math.round(100 * assoc * intensityFactor * temporalFactor * doseFactor);
    if(h === 0) score = 0;

    // Niveau de confiance fondé sur la taille d'échantillon
    let confidence = "faible";
    if(n >= 5 && h >= 3) confidence = "élevé";
    else if(n >= 3 && h >= 2) confidence = "moyen";

    rows.push({
      food, exposures:n, hits:h, nonHits, baseRate, posterior, lift,
      assoc, avgIntensity, avgDelay, avgWeight, avgPortion, doseFactor, score, confidence,
      families: food.families.slice()
    });
  }
  rows.sort((x,y)=> y.score - x.score || y.lift - x.lift);
  return { rows, baseRate, totalMeals, mealsHit };
}

/* Suspicion d'UN repas (utilisée à l'ajout d'un symptôme). */
function calculateMealSuspicion(meal, symptom){
  const h = hoursBetween(meal.datetime, symptom.startDatetime);
  const w = windowWeight(h);
  const { rows } = calculateFoodScores();
  const byId = {}; rows.forEach(r=>byId[r.food.id]=r);
  const contributors = (meal.items||[]).map(it=>{
    const r = byId[it.foodId]; const food = foodById(it.foodId);
    return { name:food?food.name:"?", score:r?r.score:0, families:food?food.families:[] };
  }).sort((a,b)=>b.score-a.score);
  // Score du repas = moyenne pondérée temps des contributeurs
  const avg = contributors.length ? contributors.reduce((s,c)=>s+c.score,0)/contributors.length : 0;
  const mealScore = Math.round(avg * (0.5 + 0.5*w));
  return { delayH:h, weight:w, label:windowLabel(h), mealScore, contributors };
}

/* Regroupe les aliments suspects par famille. */
function groupFoodsByFamily(){
  const { rows } = calculateFoodScores();
  const fam = {};
  for(const r of rows){
    const fams = r.families.length ? r.families : ["autre"];
    for(const f of fams){
      if(!fam[f]) fam[f] = { family:f, foods:[], totalScore:0, maxScore:0, hits:0 };
      fam[f].foods.push({ name:r.food.name, score:r.score });
      fam[f].totalScore += r.score;
      fam[f].maxScore = Math.max(fam[f].maxScore, r.score);
      fam[f].hits += r.hits;
    }
  }
  return Object.values(fam)
    .map(g=>{ g.foods.sort((a,b)=>b.score-a.score); g.avgScore=Math.round(g.totalScore/g.foods.length); return g; })
    .filter(g=>g.maxScore>0)
    .sort((a,b)=> b.maxScore - a.maxScore);
}

/* Analyse "IA" locale : règles + familles. */
function generateLocalAIAnalysis(){
  const groups = groupFoodsByFamily();
  if(!groups.length) return [];
  return groups.slice(0,6).map(g=>{
    let conf = "faible";
    if(g.maxScore>=66 && g.hits>=3) conf="élevé";
    else if(g.maxScore>=33 && g.hits>=2) conf="moyen";
    const hyp = FAMILY_HYPOTHESES[g.family] || FAMILY_HYPOTHESES["autre"];
    return {
      family:g.family, confidence:conf, maxScore:g.maxScore,
      foods:g.foods.slice(0,6),
      simple:`Les aliments de la famille « ${g.family} » reviennent parmi les plus associés à vos symptômes. `+
             `Ce n'est pas une preuve, mais un motif à surveiller.`,
      scientific: hyp.why + (hyp.comp.length?` Composants potentiellement en cause : ${hyp.comp.join(", ")}.`:"")
    };
  });
}

function importData(file){
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      if(!obj.foods||!obj.meals||!obj.symptoms) throw new Error("structure invalide");
      DB = Object.assign({ settings:{theme:null,window:48} }, obj);
      save(); applyTheme(); render();
      toast("Données importées");
    }catch(e){ toast("Fichier invalide : "+e.message); }
  };
  r.readAsText(file);
}
function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}
function exportCSV(){
  // Deux sections : repas (une ligne par aliment) et symptômes.
  const lines = [];
  lines.push("TYPE;id;datetime;mealType/intensity;food/symptomTypes;portion;families;notes");
  for(const m of DB.meals){
    for(const it of (m.items||[])){
      const food = foodById(it.foodId);
      lines.push(["REPAS",m.id,m.datetime,m.mealType,
        csv(food?food.name:""), csv(it.portion||it.quantity||"normale"),
        csv((food?food.families:[]).join("|")), csv(m.notes||"")].join(";"));
    }
  }
  for(const s of DB.symptoms){
    lines.push(["SYMPTOME",s.id,s.startDatetime,s.intensity,
      csv((s.types||[]).join("|")),"", "", csv(s.notes||"")].join(";"));
  }
  const blob = new Blob(["\ufeff"+lines.join("\n")], {type:"text/csv;charset=utf-8"});
  downloadBlob(blob, `food-reaction-tracker-${todayISODate()}.csv`);
}
function csv(v){ v=String(v??""); return /[;"\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }

/* ----------------------------- Données démo -------------------------- */
function loadDemo(){
  if(DB.meals.length || DB.symptoms.length){
    if(!confirm("Cela ajoute des données de démonstration à vos données existantes. Continuer ?")) return;
  }
  DB.foods=[]; // on repart propre pour la démo si vide
  const mk=(name,fams)=>getOrCreateFood(name,fams);
  const fromage = mk("fromage",["produits laitiers"]);
  const lait    = mk("lait",["produits laitiers"]);
  const pain    = mk("pain",["gluten/blé"]);
  const pates   = mk("pâtes",["gluten/blé","FODMAP"]);
  const pizza   = mk("pizza",["gluten/blé","produits laitiers","ultra-transformé"]);
  const cafe    = mk("café",["caféine"]);            // pilier fréquent -> doit ressortir BAS
  const oignon  = mk("oignon",["légumes","FODMAP"]);
  const ail     = mk("ail",["légumes","FODMAP"]);
  const pomme   = mk("pomme",["fruits","FODMAP"]);
  const poulet  = mk("poulet",["viande"]);
  const riz     = mk("riz",[]);
  const salade  = mk("salade",["légumes"]);

  // 16 jours. Café à TOUS les petits-déj (pilier fréquent -> doit ressortir BAS).
  // Les jours "laitiers" sont espacés et sont les SEULS suivis d'un symptôme :
  // le fromage doit ressortir en tête malgré une fréquence plus faible que le café.
  // Symptômes rares & espacés -> taux de base discriminant (~0,5).
  const base = new Date(); base.setHours(0,0,0,0); base.setDate(base.getDate()-16);
  const at=(day,h,min=0)=>{ const d=new Date(base); d.setDate(d.getDate()+day); d.setHours(h,min); return d.toISOString(); };
  const meal=(dt,type,items,notes="")=>addMeal({datetime:dt,mealType:type,items:items.map(f=>({foodId:f.id,quantity:"1",notes:""})),notes});
  const sym=(dt,inten,types,notes="")=>addSymptom({startDatetime:dt,endDatetime:null,intensity:inten,types,notes});

  const DAIRY_DAYS = [1,5,9,13]; // jours laitiers, espacés de 4 jours
  for(let d=0; d<16; d++){
    meal(at(d,8), "petit-déjeuner", [cafe, pain]);               // café quotidien
    if(DAIRY_DAYS.includes(d)){
      meal(at(d,12,30), "déjeuner", [fromage, pain, salade]);    // laitier
      meal(at(d,19,30), "dîner",    [poulet, riz]);
      sym(at(d,16,30), 6, ["ballonnements","douleurs abdominales"]); // ~4 h après le laitier
    } else {
      meal(at(d,12,30), "déjeuner", [poulet, riz, salade]);
      meal(at(d,19,30), "dîner", d%2 ? [pates, oignon, ail] : [poulet, salade, pomme]);
    }
  }
  // Un épisode "FODMAP" isolé pour montrer un signal secondaire plus faible.
  meal(at(7,12,30), "déjeuner", [pizza]); sym(at(7,18), 5, ["ballonnements","reflux"]);
  void lait;

  save(); render(); toast("Données de démonstration chargées");
}

/* Formulaire d'ajout OU d'édition de repas (modale) avec items dynamiques.
   Si editMeal est fourni, le formulaire est pré-rempli et met à jour ce repas. */
function openMealForm(editMeal){
  const isEdit = !!editMeal;
  const families = FAMILIES;
  const datalist = DB.foods.map(f=>`<option value="${escapeHtml(f.name)}">`).join("");

  function itemHTML(i, data){
    data = data || {};
    const pressed = new Set(data.fams||[]);
    return `<div class="item-card" data-item="${i}">
      <div class="item-top">
        <label class="field" style="flex:2"><span>Aliment</span>
          <input type="text" list="foodSugg" class="it-name" placeholder="ex : fromage" value="${escapeHtml(data.name||"")}">
        </label>
        <label class="field" style="flex:1"><span>Portion</span>
          <select class="it-portion">
            ${PORTIONS.map(p=>`<option value="${p}"${(data.portion||"normale")===p?" selected":""}>${p}</option>`).join("")}
          </select>
        </label>
        <button class="btn ghost it-rm" type="button" title="Retirer">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <span class="small muted">Familles (plusieurs possibles)</span>
        <button class="btn ghost it-ai" type="button" style="padding:4px 10px;font-size:12px;flex:none">✨ IA</button>
      </div>
      <div class="ai-panel" hidden style="margin:6px 0">
        <div class="row" style="gap:6px">
          <input type="text" class="it-aidesc" placeholder="Décris le plat (ex : burger cheddar, sauce piquante, frit)">
          <button class="btn it-aigo" type="button" style="flex:none">Analyser</button>
        </div>
        <div class="it-aistatus small muted" style="margin-top:4px"></div>
      </div>
      <div class="chips it-fams" style="margin:6px 0">
        ${families.map(f=>`<span class="chip" role="button" tabindex="0" aria-pressed="${pressed.has(f)?"true":"false"}" data-fam="${escapeHtml(f)}">${escapeHtml(f)}</span>`).join("")}
      </div>
      <div class="hint auto-hint" hidden>↺ Familles présélectionnées d'après le nom — vérifiez et ajustez.</div>
    </div>`;
  }

  // Items initiaux : ceux du repas en édition, sinon un vide.
  let initialItems = [{}];
  if(isEdit){
    const built = (editMeal.items||[]).map(it=>{
      const f = foodById(it.foodId);
      return { name:f?f.name:"", portion:itemPortion(it), fams:f?f.families.slice():[] };
    });
    if(built.length) initialItems = built;
  }

  const dateVal = isEdit ? localDateInput(editMeal.datetime) : todayISODate();
  const timeVal = isEdit ? localTimeInput(editMeal.datetime) : nowHM();
  const typeOpts = MEAL_TYPES.map(t=>`<option${isEdit&&editMeal.mealType===t?" selected":""}>${t}</option>`).join("");

  const body = `
    <datalist id="foodSugg">${datalist}</datalist>
    <div class="row">
      <label class="field"><span>Date</span><input type="date" id="mDate" value="${dateVal}"></label>
      <label class="field"><span>Heure</span><input type="time" id="mTime" value="${timeVal}"></label>
      <label class="field"><span>Repas</span>
        <select id="mType">${typeOpts}</select>
      </label>
    </div>
    <div id="mDTmirror" class="hint" style="margin:2px 0 8px"></div>
    <div class="hint" style="margin:-4px 0 10px">Portion — <strong>petite</strong> : moins que d'habitude · <strong>normale</strong> : ta portion habituelle · <strong>grande</strong> : grosse portion / rab</div>
    <div id="itemsWrap">${initialItems.map((d,i)=>itemHTML(i,d)).join("")}</div>
    <button class="btn ghost" id="addItem" type="button" style="margin-bottom:12px">+ Ajouter un aliment</button>
    <label class="field"><span>Notes du repas</span><textarea id="mNotes" placeholder="contexte, restaurant, etc.">${isEdit?escapeHtml(editMeal.notes||""):""}</textarea></label>
    <div class="btn-row" style="justify-content:flex-end">
      <button class="btn ghost" id="mCancel" type="button">Annuler</button>
      <button class="btn" id="mSave" type="button">${isEdit?"Enregistrer les modifications":"Enregistrer le repas"}</button>
    </div>`;

  const m = openModal(isEdit?"Modifier le repas":"Ajouter un repas", body);

  // Filet de sécurité : on force la date/heure via JS (Samsung Internet ignore l'attribut
  // value sur <input type=date/time>). Présélection = maintenant. Un miroir texte affiche
  // toujours la date/heure choisie, même si le champ natif ne la rend pas visible.
  const mDateEl=m.querySelector("#mDate"), mTimeEl=m.querySelector("#mTime"), mMirror=m.querySelector("#mDTmirror");
  const setDT = ()=>{ if(mDateEl) mDateEl.value=dateVal; if(mTimeEl) mTimeEl.value=timeVal; updateMirror(); };
  function updateMirror(){
    const dv=(mDateEl&&mDateEl.value)||dateVal, tv=(mTimeEl&&mTimeEl.value)||timeVal;
    const dt=new Date(`${dv}T${tv||"00:00"}`);
    mMirror.textContent = isNaN(dt) ? "" : "📅 "+dt.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"long",year:"numeric"})+" · "+(tv||timeVal);
  }
  setDT();
  requestAnimationFrame(setDT);          // re-tente une fois l'affichage prêt (Android)
  setTimeout(setDT, 60);                 // dernier filet
  if(mDateEl){ mDateEl.addEventListener("change", updateMirror); mDateEl.addEventListener("input", updateMirror); }
  if(mTimeEl){ mTimeEl.addEventListener("change", updateMirror); mTimeEl.addEventListener("input", updateMirror); }

  function wireChips(scope){
    scope.querySelectorAll(".chip").forEach(c=>{
      const toggle=()=>{ const on=c.getAttribute("aria-pressed")==="true"; c.setAttribute("aria-pressed", on?"false":"true"); scope._autoFams=false; const h=scope.querySelector(".auto-hint"); if(h) h.hidden=true; };
      c.onclick=toggle;
      c.onkeydown=(e)=>{ if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggle(); } };
    });
    scope.querySelector(".it-rm").onclick=()=>{
      if(m.querySelectorAll(".item-card").length>1) scope.remove();
      else toast("Au moins un aliment est requis");
    };
    // Présélectionne les familles d'après le nom : aliment déjà connu en priorité,
    // sinon dictionnaire intégré. N'écrase JAMAIS un choix manuel (ni les familles en édition).
    const applySuggest=()=>{
      const nameEl=scope.querySelector(".it-name");
      const hint=scope.querySelector(".auto-hint");
      const name=nameEl.value.trim();
      const anyPressed=[...scope.querySelectorAll('.chip[aria-pressed="true"]')].length>0;
      const canOverwrite = !anyPressed || scope._autoFams;
      if(hint) hint.hidden=true;
      if(!name || !canOverwrite) return;
      const setChips=(fams)=>scope.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", fams.includes(c.dataset.fam)?"true":"false"));
      const existing=DB.foods.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(existing){ setChips(existing.families); scope._autoFams=false; return; }
      const sugg=classifyFood(name);
      if(sugg.length){ setChips(sugg); scope._autoFams=true; if(hint) hint.hidden=false; }
    };
    const nameEl=scope.querySelector(".it-name");
    nameEl.addEventListener("change", applySuggest);
    nameEl.addEventListener("input", applySuggest);

    // Bouton IA : l'utilisateur décrit le plat, l'IA coche les familles (parmi la liste connue).
    const aiBtn=scope.querySelector(".it-ai"), aiPanel=scope.querySelector(".ai-panel");
    const aiDesc=scope.querySelector(".it-aidesc"), aiGo=scope.querySelector(".it-aigo"), aiStatus=scope.querySelector(".it-aistatus");
    aiBtn.onclick=()=>{
      if(!SESSION_API_KEY){ toast("Configure une clé IA dans Réglages pour utiliser ce bouton"); return; }
      aiPanel.hidden=!aiPanel.hidden;
      if(!aiPanel.hidden){ if(!aiDesc.value) aiDesc.value=nameEl.value.trim(); aiDesc.focus(); }
    };
    aiGo.onclick=async ()=>{
      const desc=(aiDesc.value.trim()||nameEl.value.trim());
      if(!desc){ toast("Écris une description"); return; }
      aiStatus.textContent="Analyse…"; aiGo.disabled=true;
      try{
        const fams=await classifyFoodAI(desc);
        if(fams.length){
          const set=new Set([...scope.querySelectorAll('.chip[aria-pressed="true"]')].map(c=>c.dataset.fam));
          fams.forEach(f=>set.add(f)); // l'IA AJOUTE aux familles déjà cochées
          scope.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", set.has(c.dataset.fam)?"true":"false"));
          scope._autoFams=false;
          const h=scope.querySelector(".auto-hint"); if(h){ h.hidden=false; h.textContent="↺ Familles proposées par l'IA — vérifiez et ajustez."; }
          aiStatus.textContent="Coché : "+fams.join(", ");
        } else { aiStatus.textContent="Aucune famille identifiée pour cette description."; }
      }catch(e){ aiStatus.textContent="Erreur IA : "+e.message; }
      finally{ aiGo.disabled=false; }
    };
  }
  m.querySelectorAll(".item-card").forEach(wireChips);

  let counter=initialItems.length;
  m.querySelector("#addItem").onclick=()=>{
    const wrap=m.querySelector("#itemsWrap");
    const tmp=document.createElement("div"); tmp.innerHTML=itemHTML(counter++);
    const node=tmp.firstElementChild; wrap.appendChild(node); wireChips(node);
  };
  m.querySelector("#mCancel").onclick=closeModal;
  m.querySelector("#mSave").onclick=()=>{
    const date=m.querySelector("#mDate").value || dateVal, time=m.querySelector("#mTime").value || timeVal;
    if(!date||!time){ toast("Date et heure requises"); return; }
    const datetime=new Date(`${date}T${time}`).toISOString();
    const itemNodes=[...m.querySelectorAll(".item-card")];
    const built=[];
    for(const node of itemNodes){
      const name=node.querySelector(".it-name").value.trim();
      if(!name) continue;
      const fams=[...node.querySelectorAll('.chip[aria-pressed="true"]')].map(c=>c.dataset.fam);
      const food=getOrCreateFood(name,fams);
      built.push({ foodId:food.id, portion:node.querySelector(".it-portion").value, notes:"" });
    }
    if(!built.length){ toast("Ajoutez au moins un aliment"); return; }
    const mealType=m.querySelector("#mType").value, notes=m.querySelector("#mNotes").value.trim();
    if(isEdit){
      const idx=DB.meals.findIndex(x=>x.id===editMeal.id);
      if(idx>=0){ DB.meals[idx]={ ...DB.meals[idx], datetime, mealType, items:built, notes }; save(); }
      closeModal(); render(); toast("Repas modifié");
    } else {
      addMeal({ datetime, mealType, items:built, notes });
      closeModal(); render(); toast("Repas enregistré");
    }
  };
}

function precedingMealsHTML(s){
  const prec=DB.meals
    .map(m=>({m, h:hoursBetween(m.datetime,s.startDatetime)}))
    .filter(o=>o.h>0 && o.h<=MAX_WINDOW_H)
    .sort((a,b)=>a.h-b.h);
  if(!prec.length) return `<div class="muted" style="padding:6px 0">Aucun repas dans les 48 h précédentes.</div>`;
  return prec.map(o=>{
    const susp=calculateMealSuspicion(o.m,s);
    const lvl = susp.mealScore>=66?"eleve":susp.mealScore>=33?"moyen":"faible";
    const top=susp.contributors.slice(0,3).map(c=>`${escapeHtml(c.name)} (${c.score})`).join(", ");
    return `<div style="border-top:1px solid var(--line);padding:8px 0">
      <strong>${escapeHtml(o.m.mealType)}</strong> · ${windowLabel(o.h)} avant
      <span class="lvl ${lvl}" style="margin-left:6px">suspicion ${susp.mealScore}</span>
      <div class="muted">Contribue le plus : ${top||"—"}</div>
    </div>`;
  }).join("");
}

    const dv=(sDateEl&&sDateEl.value)||todayISODate(), tv=(sTimeEl&&sTimeEl.value)||nowHM();
    const dt=new Date(`${dv}T${tv||"00:00"}`);
    sMirror.textContent = isNaN(dt) ? "" : "📅 "+dt.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"long",year:"numeric"})+" · "+tv;
  }
  const setSDT = ()=>{ if(sDateEl) sDateEl.value=todayISODate(); if(sTimeEl) sTimeEl.value=nowHM(); updateSMirror(); };
  setSDT(); requestAnimationFrame(setSDT); setTimeout(setSDT, 60);
  if(sDateEl){ sDateEl.addEventListener("change", updateSMirror); sDateEl.addEventListener("input", updateSMirror); }
  if(sTimeEl){ sTimeEl.addEventListener("change", updateSMirror); sTimeEl.addEventListener("input", updateSMirror); }
  m.querySelector("#sInten").oninput=e=>m.querySelector("#intenVal").textContent=e.target.value;
  m.querySelector("#qToday").onclick=()=>{ sDateEl.value=todayISODate(); updateSMirror(); };
  m.querySelector("#qYest").onclick=()=>{ sDateEl.value=todayISODate(-1); updateSMirror(); };
  m.querySelectorAll("#symTypes .chip").forEach(c=>{
    const toggle=()=>{ const on=c.getAttribute("aria-pressed")==="true"; c.setAttribute("aria-pressed",on?"false":"true"); };
    c.onclick=toggle; c.onkeydown=e=>{ if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();} };
  });
  m.querySelector("#sCancel").onclick=closeModal;
  m.querySelector("#sSave").onclick=()=>{
    const d=m.querySelector("#sDate").value || todayISODate(), t=m.querySelector("#sTime").value || nowHM();
    if(!d||!t){ toast("Date et heure de début requises"); return; }
    const start=new Date(`${d}T${t}`).toISOString();
    let end=null;
    const ed=m.querySelector("#sEndDate").value, et=m.querySelector("#sEndTime").value;
    if(ed&&et) end=new Date(`${ed}T${et}`).toISOString();
    const types=[...m.querySelectorAll('#symTypes .chip[aria-pressed="true"]')].map(c=>c.dataset.t);
    if(!types.length){ toast("Choisissez au moins un type"); return; }
    addSymptom({ startDatetime:start, endDatetime:end, intensity:+m.querySelector("#sInten").value, types, notes:m.querySelector("#sNotes").value.trim() });
    closeModal(); render(); toast("Épisode enregistré");
  };
}

    <div class="grid cols-2">

        <div class="gauge"><div class="score-n">${avgDelayGlobal(res)} h</div><div class="meta">délai moyen, sur l'ensemble des associations détectées</div></div>
      </div>
    </div>
    <hr class="hr">

      <div class="small muted" style="margin-top:8px">
        Pour chaque aliment on compte les repas le contenant (<em>expositions</em>) et combien sont suivis d'un symptôme
        dans les 48 h (<em>occurrences</em>). On compare le taux obtenu au <strong>taux de base</strong> de l'ensemble des repas,
        avec un lissage qui modère les petits échantillons. Le score combine cet écart, l'intensité moyenne des symptômes et la
        proximité temporelle. Un aliment mangé tout le temps (ex : café) n'obtient un score élevé que s'il est suivi de symptômes
        <em>plus souvent</em> que la moyenne — sinon il reste bas malgré sa fréquence. C'est une corrélation observée, pas une preuve.
      </div>

}
function topFoodsBars(res){
  return res.rows.filter(r=>r.score>0).slice(0,8).map(r=>({label:r.food.name, value:r.score}));
}
function familyBars(){
  return groupFoodsByFamily().slice(0,8).map(g=>({label:g.family, value:g.maxScore}));
}
function symptomIntensityBars(){
  const acc={};
  DB.symptoms.forEach(s=>(s.types||[]).forEach(t=>{ (acc[t]=acc[t]||[]).push(s.intensity); }));
  return Object.entries(acc).map(([t,arr])=>({label:t, value:Math.round(arr.reduce((a,b)=>a+b,0)/arr.length*10)}))
    .sort((a,b)=>b.value-a.value).slice(0,8);
}
function avgDelayGlobal(res){
  const d=res.rows.filter(r=>r.hits>0).map(r=>r.avgDelay);
  if(!d.length) return "—";
  return (d.reduce((a,b)=>a+b,0)/d.length).toFixed(1);
}
function barChart(data, color){
  if(!data.length) return `<div class="muted small">Pas de données.</div>`;
  const max=Math.max(...data.map(d=>d.value),1);
  return `<div class="bars">`+data.map(d=>{
    const pct=Math.round(d.value/max*100);
    return `<div class="bar-row">
      <div title="${escapeHtml(d.label)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(d.label)}</div>
      <div class="bar-track"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
      <div class="v">${d.value}</div></div>`;
  }).join("")+`</div>`;
}

/* Calcule la couverture par nutriment sur une période (en jours).
   Unité = "portions/jour" estimées à partir des aliments loggés. */
function computeNutrientCoverage(periodDays){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-periodDays);
  const meals = DB.meals.filter(m => new Date(m.datetime) >= cutoff);
  const days = new Set(meals.map(m => m.datetime.slice(0,10)));
  const nDays = Math.max(1, days.size);

  // total de "portions-source" par nutriment (un aliment compte au plus 1 fois par nutriment)
  const totals = {}; NUTRIENTS.forEach(n => totals[n.id] = 0);

  for(const m of meals){
    for(const it of (m.items||[])){
      const food = foodById(it.foodId); if(!food) continue;
      const hits = new Set(); // nutriments couverts par CET aliment
      // 1) via familles
      for(const n of NUTRIENTS){
        if(n.fams.some(f => food.families.includes(f))) hits.add(n.id);
      }
      // 2) via nom (plus précis : bêta-carotène, oméga-3…)
      const name = deaccent(food.name);
      for(const rule of NAME_NUTRIENTS){
        if(rule.kw.some(k => name.includes(k))) rule.ids.forEach(id => hits.add(id));
      }
      const w = portionWeight(itemPortion(it)); // grande = 1,5 ; petite = 0,5
      hits.forEach(id => { if(totals[id]!==undefined) totals[id]+=w; });
    }
  }

  return NUTRIENTS.map(n => {
    const avgPerDay = totals[n.id] / nDays;
    const coverage  = n.target>0 ? avgPerDay / n.target : 0;
    let level = "absent";
    if(coverage >= 0.8) level = "bon";
    else if(coverage >= 0.4) level = "moyen";
    else if(coverage > 0)    level = "faible";
    return { ...n, total:totals[n.id], avgPerDay, coverage, level };
  });
}

function viewNutrition(v){
  const period = DB.settings.nutPeriod || 7;
  const cov = computeNutrientCoverage(period);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-period);
  const meals = DB.meals.filter(m => new Date(m.datetime) >= cutoff);
  const nDays = new Set(meals.map(m=>m.datetime.slice(0,10))).size;

  const opt = (d,l)=>`<option value="${d}"${period==d?" selected":""}>${l}</option>`;
  v.innerHTML = `
    <div class="section-head"><h2>Nutrition &amp; couverture</h2>

    </div>`;

  if(!meals.length){

    document.getElementById("nutPeriod").onchange = e=>{ DB.settings.nutPeriod=+e.target.value; save(); render(); };

  }

  const missing = cov.filter(c => c.level==="faible" || c.level==="absent");

  const lvlClass = l => l==="bon"?"faible":(l==="moyen"?"moyen":"eleve"); // réutilise les couleurs : bon=vert, moyen=ambre, faible/absent=rouge
  const lvlColor = l => l==="bon"?"sage":(l==="moyen"?"amber":"coral");
  const lvlLabel = l => ({bon:"bon",moyen:"moyen",faible:"faible",absent:"absent"})[l];

  const bars = cov.map(c=>{
    const pct = Math.min(100, Math.round(c.coverage*100));

      <div class="bar-track"><div class="bar-fill ${lvlColor(c.level)}" style="width:${pct}%"></div></div>
      <div class="v"><span class="lvl ${lvlClass(c.level)}" style="padding:1px 7px">${lvlLabel(c.level)}</span></div>
    </div>`;
  }).join("");

  const wrap = document.createElement("div");
  wrap.innerHTML = `
    <div class="ok-note small" style="margin-bottom:14px">${nDays} jour(s) avec repas analysé(s) · ${meals.length} repas. La cible est un repère indicatif d'une alimentation variée pour un adulte.</div>

    <div class="grid cols-2">
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:12px">Couverture estimée</h3>
        <div class="bars">${bars}</div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:12px">Ce qui semble manquer</h3>
        ${missing.length ? missing.map(c=>`
          <div style="border-bottom:1px solid var(--line);padding:8px 0">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
              <strong>${escapeHtml(c.label)}</strong>
              <span class="lvl ${lvlClass(c.level)}" style="padding:1px 8px">${lvlLabel(c.level)}</span>
            </div>
            <div class="small muted" style="margin-top:3px">Pensez à : ${c.suggest.map(escapeHtml).join(", ")}.</div>
          </div>`).join("")
        : `<div class="muted small">Rien d'évident ne manque sur cette période. Continuez à varier.</div>`}
        ${good.length?`<div class="small" style="margin-top:12px">✅ Bien couvert : ${good.map(c=>escapeHtml(c.label)).join(", ")}.</div>`:""}
      </div>
    </div>

    <hr class="hr">
    <details><summary>Comment c'est estimé ? (et pourquoi pas de grammes)</summary>
      <div class="small muted" style="margin-top:8px">
        Chaque aliment que vous loggez compte pour ~1 portion. Pour chaque nutriment, on regarde combien de vos aliments
        en sont une <em>source</em> — d'après leurs familles (ex : « viande » → protéines) et leur nom (ex : « carotte » → bêta-carotène).
        On divise par le nombre de jours pour obtenir des portions/jour, comparées à une cible indicative. Les quantités réelles
        ne sont pas connues : un aliment sans famille ni nom reconnu ne compte pas, et « assez » dépend de votre âge, sexe et activité.
        À utiliser comme boussole de diversité, pas comme bilan.
      </div>
    </details>`;
  v.appendChild(wrap);
  document.getElementById("nutPeriod").onchange = e=>{ DB.settings.nutPeriod=+e.target.value; save(); render(); };
}

  const groups=groupFoodsByFamily().slice(0,8)
    .map(g=>`- ${g.family} : score max ${g.maxScore}, aliments ${g.foods.slice(0,4).map(f=>f.name+"("+f.score+")").join(", ")}`).join("\n");
  return `Tu es un assistant éducatif en nutrition. À partir de ces corrélations OBSERVÉES (pas un diagnostic), `+
    `regroupe les familles suspectes, donne un niveau de confiance et une explication prudente en français. `+
    `N'affirme jamais d'intolérance ; utilise "peut", "semble associé". Termine par un rappel de consulter un professionnel.\n\nDonnées:\n${groups}`;
}
function buildFoodPrompt(r){
  return `Assistant éducatif nutrition. Aliment "${r.food.name}", familles: ${r.families.join(", ")||"?"}, `+
    `apparu avant ${r.hits} épisode(s) sur ${r.exposures} consommations, délai moyen ${r.avgDelay.toFixed(1)} h, `+
    `intensité moyenne ${r.avgIntensity.toFixed(1)}/10. Explique en français, prudemment ("peut", "pourrait"), `+
    `les composants possibles, les réactions possibles et les limites. Pas de diagnostic. Rappelle de consulter si besoin.`;
}
async function callExternalAI(prompt){
  const provider=DB.settings.aiProvider||"anthropic";
  if(!SESSION_API_KEY) throw new Error("aucune clé configurée");
  if(provider==="openai"){
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{ "Content-Type":"application/json","Authorization":"Bearer "+SESSION_API_KEY },
      body:JSON.stringify({ model:"gpt-4o-mini", messages:[{role:"user",content:prompt}], max_tokens:600 })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const d=await res.json(); return d.choices?.[0]?.message?.content?.trim()||"(réponse vide)";
  } else if(provider==="gemini"){
    // Google Gemini — la clé passe en paramètre d'URL. Modèle modifiable ici si besoin.
    const model="gemini-3.5-flash";
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(SESSION_API_KEY)}`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ contents:[{ parts:[{ text:prompt }] }] })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const d=await res.json();
    const parts=d.candidates?.[0]?.content?.parts||[];
    return parts.map(p=>p.text||"").join("\n").trim()||"(réponse vide)";
  } else {
    // Anthropic — nécessite l'en-tête d'accès navigateur direct.
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{ "Content-Type":"application/json","x-api-key":SESSION_API_KEY,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
      body:JSON.stringify({ model:"claude-3-5-haiku-latest", max_tokens:600, messages:[{role:"user",content:prompt}] })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const d=await res.json();
    return (d.content||[]).map(c=>c.text||"").join("\n").trim()||"(réponse vide)";
  }
}

/* Demande à l'IA de classer un aliment décrit librement, en NE renvoyant QUE des familles
   de la liste connue (tout le reste est filtré -> pas d'hallucination de familles). */
async function classifyFoodAI(description){
  const prompt = `Tu classes un aliment dans des familles alimentaires.
Familles autorisées (utilise EXACTEMENT ces libellés, sans en inventer) : ${FAMILIES.join(", ")}.
Aliment décrit par l'utilisateur : "${description}".
Tiens compte du mode de cuisson (ex : frit -> "friture") et des ingrédients (ex : pomme de terre frite -> "légumes" + "friture" ; sauce piquante -> "épices").
Réponds UNIQUEMENT par un tableau JSON des familles pertinentes, sans aucun texte ni Markdown. Exemple : ["légumes","friture"]. Si rien ne correspond : [].`;
  const txt = await callExternalAI(prompt);
  let arr = null;
  try { arr = JSON.parse(txt.replace(/```json|```/g,"").trim()); }
  catch(_){ const mtc = txt.match(/\[[\s\S]*?\]/); if(mtc){ try{ arr = JSON.parse(mtc[0]); }catch(__){} } }
  if(!Array.isArray(arr)) return [];
  return arr.filter(f => FAMILIES.includes(f)); // ne garde que les familles connues
}

/* ------------------------------- Helpers UI -------------------------- */
function emptyHTML(big, sub){ return `<div class="empty"><div class="big">${escapeHtml(big)}</div><div class="small">${escapeHtml(sub)}</div></div>`; }

/* Jauge "signature" : volontairement pointillée pour rappeler l'incertitude. */
function gaugeSVG(score){
  const r=34, c=Math.PI*r, pct=Math.max(0,Math.min(100,score))/100;
  const col=score>=66?"var(--coral)":score>=33?"var(--amber)":"var(--sage)";
  return `<svg width="86" height="62" viewBox="0 0 86 62" aria-hidden="true">
    <path d="M9 52 A34 34 0 0 1 77 52" fill="none" stroke="var(--line-strong)" stroke-width="9" stroke-linecap="round" stroke-dasharray="2 5"/>
    <path d="M9 52 A34 34 0 0 1 77 52" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${(c*pct).toFixed(1)} ${c.toFixed(1)}"/>
  </svg>`;
}

/* Modale générique */
function openModal(title, bodyHTML){
  const root=document.getElementById("modalRoot");
  root.innerHTML=`<div class="modal-bg" id="modalBg"><div class="modal" role="dialog" aria-modal="true" aria-label="${escapeHtml(title)}">
    <button class="close" id="modalX" aria-label="Fermer">×</button>
    <h3>${escapeHtml(title)}</h3><div class="hr" style="margin:12px 0"></div>
    <div id="modalBody"></div></div></div>`;
  root.querySelector("#modalBody").innerHTML=bodyHTML;
  root.querySelector("#modalX").onclick=closeModal;
  root.querySelector("#modalBg").onclick=e=>{ if(e.target.id==="modalBg") closeModal(); };
  document.addEventListener("keydown", escClose);
  return root.querySelector("#modalBody");
}
function escClose(e){ if(e.key==="Escape") closeModal(); }
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; document.removeEventListener("keydown", escClose); }

/* ------------------------------- Thème ------------------------------- */
function applyTheme(){
  let theme=DB.settings.theme;
  if(!theme) theme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", theme);
  const lbl=document.getElementById("themeLbl");
  if(lbl) lbl.textContent = theme==="dark" ? "Clair" : "Sombre";
}
document.getElementById("themeBtn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  DB.settings.theme = cur==="dark" ? "light" : "dark"; save(); applyTheme();
};

/* ------------------------------- Navigation -------------------------- */
document.getElementById("tabs").addEventListener("click", e=>{
  const b=e.target.closest("[data-tab]"); if(!b) return;
  document.querySelectorAll('nav.tabs [role="tab"]').forEach(t=>t.setAttribute("aria-selected","false"));
  b.setAttribute("aria-selected","true"); render();
});

/* ------------------------------- Démarrage --------------------------- */
load(); applyTheme(); render();

/* ---- Service worker : fonctionnement hors-ligne (nécessite sw.js servi en HTTPS) ----
   Sans effet en file:// ou sans le fichier sw.js — l'appli reste fonctionnelle. */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}
